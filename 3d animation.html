<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesture Particles</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  #canvas3d { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  #webcam { position: fixed; bottom: 20px; right: 20px; width: 200px; height: 150px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); object-fit: cover; transform: scaleX(-1); opacity: 0.85; z-index: 10; }
  #handCanvas { position: fixed; bottom: 20px; right: 20px; width: 200px; height: 150px; border-radius: 12px; z-index: 11; pointer-events: none; transform: scaleX(-1); }
  #ui { position: fixed; top: 20px; left: 20px; z-index: 20; color: #fff; }
  #ui h1 { font-size: 18px; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; opacity: 0.9; margin-bottom: 12px; }
  .shape-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .shape-btn { padding: 6px 14px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); color: #fff; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
  .shape-btn:hover, .shape-btn.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.7); }
  #gesture-status { font-size: 12px; opacity: 0.7; margin-top: 6px; letter-spacing: 1px; }
  #info { position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 1px; z-index: 20; line-height: 1.8; }
  #cam-btn { padding: 6px 14px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); color: #fff; border-radius: 20px; font-size: 12px; cursor: pointer; letter-spacing: 1px; }
  #cam-btn:hover { background: rgba(255,255,255,0.15); }
  #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-size: 14px; letter-spacing: 2px; z-index: 100; opacity: 0.7; }
</style>
</head>
<body>
<div id="loading">LOADING PARTICLE ENGINE...</div>
<canvas id="canvas3d"></canvas>
<video id="webcam" autoplay muted playsinline></video>
<canvas id="handCanvas"></canvas>
<div id="ui">
  <h1>✦ Gesture Particles</h1>
  <div class="shape-btns">
    <button class="shape-btn active" onclick="setShape('sphere')">● Sphere</button>
    <button class="shape-btn" onclick="setShape('heart')">♥ Heart</button>
    <button class="shape-btn" onclick="setShape('flower')">✿ Flower</button>
    <button class="shape-btn" onclick="setShape('saturn')">⊙ Saturn</button>
    <button class="shape-btn" onclick="setShape('fireworks')">✦ Fireworks</button>
    <button class="shape-btn" onclick="setShape('dna')">⟁ DNA</button>
    <button class="shape-btn" onclick="setShape('galaxy')">⊛ Galaxy</button>
    <button class="shape-btn" onclick="setShape('tornado')">⟳ Tornado</button>
  </div>
  <button id="cam-btn" onclick="startCamera()">📷 Enable Camera</button>
  <div id="gesture-status">Camera off — click to enable gestures</div>
</div>
<div id="info">
  OPEN HAND → expand &nbsp;|&nbsp; FIST → contract &nbsp;|&nbsp; POINT → rotate<br>
  TWO HANDS → color shift &nbsp;|&nbsp; MOUSE → drag to spin
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
const PARTICLE_COUNT = 4000;
let scene, camera, renderer, particles, particleGeo, particleMat;
let mouse = {x:0,y:0}, targetMouse = {x:0,y:0};
let currentShape = 'sphere';
let expansionFactor = 1.0, targetExpansion = 1.0;
let colorShift = 0, targetColorShift = 0;
let rotSpeed = 0.003;
let handPresent = false, fistDetected = false, pointDetected = false, twoHands = false;
let morphProgress = 0, morphing = false;
let basePositions = [], targetPositions = [];
let currentPositions = [];
let frameCount = 0;
let cameraStarted = false;

// --- Three.js Setup ---
function initThree() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);

  particleGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(PARTICLE_COUNT * 3);
  const colors = new Float32Array(PARTICLE_COUNT * 3);
  const sizes = new Float32Array(PARTICLE_COUNT);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = getShapePosition('sphere', i);
    positions[i*3] = p.x; positions[i*3+1] = p.y; positions[i*3+2] = p.z;
    currentPositions.push({x:p.x,y:p.y,z:p.z});
    basePositions.push({x:p.x,y:p.y,z:p.z});
    targetPositions.push({x:p.x,y:p.y,z:p.z});
    const c = getColor(i, 0, 'sphere');
    colors[i*3]=c.r; colors[i*3+1]=c.g; colors[i*3+2]=c.b;
    sizes[i] = Math.random() * 2 + 1;
  }

  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  particleMat = new THREE.ShaderMaterial({
    uniforms: { time: {value:0}, expansion:{value:1.0}, globalColor:{value:new THREE.Color(1,1,1)} },
    vertexShader: `
      attribute float size;
      attribute vec3 color;
      varying vec3 vColor;
      uniform float expansion;
      void main(){
        vColor = color;
        vec4 mv = modelViewMatrix * vec4(position * expansion, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = size * (18.0 / -mv.z);
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main(){
        float d = length(gl_PointCoord - vec2(0.5));
        if(d>0.5) discard;
        float a = 1.0 - smoothstep(0.3,0.5,d);
        gl_FragColor = vec4(vColor, a);
      }
    `,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });

  particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);
  document.getElementById('loading').style.display = 'none';
  window.addEventListener('resize', onResize);
  document.addEventListener('mousemove', onMouse);
  document.addEventListener('touchmove', onTouch, {passive:true});
  animate();
}

function getShapePosition(shape, i) {
  const t = i / PARTICLE_COUNT;
  const r = () => (Math.random()-0.5)*2;
  switch(shape) {
    case 'sphere': {
      const phi = Math.acos(-1+2*Math.random());
      const theta = Math.random()*Math.PI*2;
      const rad = 1.5 + r()*0.3;
      return {x:rad*Math.sin(phi)*Math.cos(theta), y:rad*Math.sin(phi)*Math.sin(theta), z:rad*Math.cos(phi)};
    }
    case 'heart': {
      const a = Math.random()*Math.PI*2;
      const layer = r()*0.12;
      const hx = 16*Math.pow(Math.sin(a),3);
      const hy = 13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a);
      return {x:hx*0.12+r()*0.04, y:hy*0.12+r()*0.04, z:layer};
    }
    case 'flower': {
      const ang = t*Math.PI*2*12;
      const rad2 = 1.5*(Math.cos(6*ang)+1.2);
      const z2 = Math.sin(ang*2)*0.3;
      return {x:rad2*Math.cos(ang)*0.4+r()*0.04, y:rad2*Math.sin(ang)*0.4+r()*0.04, z:z2};
    }
    case 'saturn': {
      if(i < PARTICLE_COUNT*0.45) {
        const phi2 = Math.acos(-1+2*Math.random());
        const theta2 = Math.random()*Math.PI*2;
        const rad3 = 0.9+r()*0.1;
        return {x:rad3*Math.sin(phi2)*Math.cos(theta2), y:rad3*Math.sin(phi2)*Math.sin(theta2)*0.65, z:rad3*Math.cos(phi2)};
      } else {
        const a2 = Math.random()*Math.PI*2;
        const rad4 = 1.4+Math.random()*0.9;
        return {x:rad4*Math.cos(a2), y:(r()*0.04), z:rad4*Math.sin(a2)};
      }
    }
    case 'fireworks': {
      const burst = Math.floor(Math.random()*12);
      const ba = (burst/12)*Math.PI*2;
      const dist = Math.random()*2.2;
      const sp = r()*0.4;
      return {x:Math.cos(ba)*dist+r()*0.15, y:Math.sin(ba)*dist+r()*0.15, z:sp};
    }
    case 'dna': {
      const h = (t-0.5)*5;
      const strand = i%2;
      const a3 = h*1.5 + strand*Math.PI;
      const rad5 = 0.6;
      return {x:rad5*Math.cos(a3)+r()*0.05, y:h*0.3, z:rad5*Math.sin(a3)+r()*0.05};
    }
    case 'galaxy': {
      const arm = Math.floor(Math.random()*3);
      const aOff = (arm/3)*Math.PI*2;
      const dist2 = Math.pow(Math.random(),0.5)*2.2;
      const spiral = aOff + dist2*2.5 + r()*0.4;
      return {x:dist2*Math.cos(spiral), y:r()*0.15*dist2, z:dist2*Math.sin(spiral)};
    }
    case 'tornado': {
      const h2 = (t-0.5)*4;
      const rad6 = Math.abs(h2)*0.5+0.05;
      const a4 = h2*4+Math.random()*0.3;
      return {x:rad6*Math.cos(a4), y:h2*0.7, z:rad6*Math.sin(a4)};
    }
    default: return {x:r(),y:r(),z:r()};
  }
}

function getColor(i, shift, shape) {
  const t = i / PARTICLE_COUNT;
  const palettes = {
    sphere: [[0.4+0.6*t, 0.2, 1-0.5*t]],
    heart: [[1, 0.2+0.3*t, 0.3+0.2*t]],
    flower: [[0.3+0.7*Math.sin(t*Math.PI), 1, 0.4+0.4*Math.cos(t*Math.PI)]],
    saturn: [[0.9+0.1*t, 0.7+0.2*t, 0.3]],
    fireworks: [[Math.sin(t*6.28)*0.5+0.5, Math.sin(t*6.28+2.1)*0.5+0.5, Math.sin(t*6.28+4.2)*0.5+0.5]],
    dna: [[0.2+0.8*(i%2), 0.8-0.4*t, 1]],
    galaxy: [[0.5+0.5*t, 0.3+0.3*t, 1-0.4*t]],
    tornado: [[0.2+0.7*t, 0.6+0.3*t, 1]]
  };
  let [r,g,b] = (palettes[shape]||palettes.sphere)[0];
  const s = shift * Math.PI * 2;
  const rr = Math.sin(r*Math.PI+s)*0.5+0.5;
  const gg = Math.sin(g*Math.PI+s+2.1)*0.5+0.5;
  const bb = Math.sin(b*Math.PI+s+4.2)*0.5+0.5;
  return {r:rr,g:gg,b:bb};
}

function setShape(shape) {
  if(shape===currentShape) return;
  document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  currentShape = shape;
  morphing = true; morphProgress = 0;
  targetPositions = [];
  for(let i=0;i<PARTICLE_COUNT;i++) {
    targetPositions.push(getShapePosition(shape,i));
  }
}

function morphParticles(delta) {
  if(!morphing) return;
  morphProgress = Math.min(1, morphProgress + delta*1.8);
  const ease = morphProgress<0.5 ? 2*morphProgress*morphProgress : -1+(4-2*morphProgress)*morphProgress;
  const pos = particleGeo.attributes.position.array;
  const col = particleGeo.attributes.color.array;
  for(let i=0;i<PARTICLE_COUNT;i++) {
    const bp = basePositions[i]; const tp = targetPositions[i];
    const x = bp.x+(tp.x-bp.x)*ease;
    const y = bp.y+(tp.y-bp.y)*ease;
    const z = bp.z+(tp.z-bp.z)*ease;
    pos[i*3]=x; pos[i*3+1]=y; pos[i*3+2]=z;
    currentPositions[i]={x,y,z};
    const c = getColor(i,colorShift,currentShape);
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
  }
  particleGeo.attributes.position.needsUpdate = true;
  particleGeo.attributes.color.needsUpdate = true;
  if(morphProgress>=1){morphing=false; basePositions=[...currentPositions];}
}

function updateColors() {
  const col = particleGeo.attributes.color.array;
  for(let i=0;i<PARTICLE_COUNT;i++){
    const c = getColor(i,colorShift,currentShape);
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
  }
  particleGeo.attributes.color.needsUpdate = true;
}

let lastTime = 0;
function animate(time=0) {
  requestAnimationFrame(animate);
  const delta = Math.min((time-lastTime)/1000, 0.05);
  lastTime = time;
  frameCount++;

  // Gesture-based control
  targetExpansion = fistDetected ? 0.35 : (twoHands ? 1.6 : 1.0);
  expansionFactor += (targetExpansion - expansionFactor) * 0.08;

  if(twoHands) {
    targetColorShift += delta * 0.4;
    colorShift += (targetColorShift - colorShift)*0.1;
    if(frameCount%3===0) updateColors();
  }

  particleMat.uniforms.expansion.value = expansionFactor;
  particleMat.uniforms.time.value = time*0.001;

  // Mouse rotation
  targetMouse.x += (mouse.x - targetMouse.x)*0.05;
  targetMouse.y += (mouse.y - targetMouse.y)*0.05;

  const spinX = pointDetected ? 0.015 : rotSpeed;
  particles.rotation.y += spinX + targetMouse.x * 0.002;
  particles.rotation.x += targetMouse.y * 0.001;

  if(morphing) morphParticles(delta);
  else if(!morphing && twoHands && frameCount%4===0) updateColors();

  renderer.render(scene, camera);
}

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
function onMouse(e){
  mouse.x = (e.clientX/window.innerWidth-0.5)*2;
  mouse.y = -(e.clientY/window.innerHeight-0.5)*2;
}
function onTouch(e){
  if(e.touches[0]){
    mouse.x=(e.touches[0].clientX/window.innerWidth-0.5)*2;
    mouse.y=-(e.touches[0].clientY/window.innerHeight-0.5)*2;
  }
}

// --- Hand Gesture via MediaPipe Hands ---
async function startCamera() {
  if(cameraStarted) return;
  document.getElementById('cam-btn').textContent = '⏳ Starting...';
  document.getElementById('gesture-status').textContent = 'Loading hand tracking model...';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}});
    const vid = document.getElementById('webcam');
    vid.srcObject = stream;
    await vid.play();
    cameraStarted = true;
    document.getElementById('cam-btn').textContent = '📷 Camera On';
    document.getElementById('gesture-status').textContent = 'Initializing MediaPipe...';
    loadMediaPipe();
  } catch(e) {
    document.getElementById('gesture-status').textContent = 'Camera denied — use buttons instead';
    document.getElementById('cam-btn').textContent = '🚫 No Camera';
  }
}

function loadMediaPipe() {
  const script1 = document.createElement('script');
  script1.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';
  script1.onload = () => {
    const script2 = document.createElement('script');
    script2.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
    script2.onload = initHandTracking;
    document.head.appendChild(script2);
  };
  document.head.appendChild(script1);
}

function initHandTracking() {
  const vid = document.getElementById('webcam');
  const hCanvas = document.getElementById('handCanvas');
  const ctx = hCanvas.getContext('2d');
  hCanvas.width = 200; hCanvas.height = 150;

  const hands = new Hands({locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands:2, modelComplexity:0, minDetectionConfidence:0.6, minTrackingConfidence:0.5});

  hands.onResults(results => {
    ctx.clearRect(0,0,200,150);
    const numHands = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
    twoHands = numHands >= 2;
    handPresent = numHands > 0;

    if(!handPresent) {
      fistDetected = false; pointDetected = false;
      document.getElementById('gesture-status').textContent = '✋ No hand detected';
      return;
    }

    const lm = results.multiHandLandmarks[0];
    const gesture = detectGesture(lm);
    fistDetected = gesture === 'fist';
    pointDetected = gesture === 'point';
    document.getElementById('gesture-status').textContent =
      twoHands ? '🙌 TWO HANDS → Color shifting!' :
      gesture==='fist' ? '✊ FIST → Contracting' :
      gesture==='point' ? '☝️ POINT → Fast spin' :
      gesture==='open' ? '🖐 OPEN → Expanding' : '✋ Hand detected';

    // Draw landmarks
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(0,0,200,150);
    results.multiHandLandmarks.forEach((landmarks,hi) => {
      const colors = ['#7af7ff','#ff7af7'];
      landmarks.forEach((pt,pi) => {
        const x = (1-pt.x)*200; const y = pt.y*150;
        ctx.beginPath();
        ctx.arc(x,y,pi===0?5:3,0,Math.PI*2);
        ctx.fillStyle = colors[hi];
        ctx.fill();
      });
      // Draw connections
      const conn = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
      ctx.strokeStyle = colors[hi]+'80'; ctx.lineWidth=1.5;
      conn.forEach(([a,b])=>{
        ctx.beginPath();
        ctx.moveTo((1-landmarks[a].x)*200,landmarks[a].y*150);
        ctx.lineTo((1-landmarks[b].x)*200,landmarks[b].y*150);
        ctx.stroke();
      });
    });
  });

  const mpCam = new Camera(vid, {
    onFrame: async () => { await hands.send({image:vid}); },
    width:320, height:240
  });
  mpCam.start();
  document.getElementById('gesture-status').textContent = '✋ Show your hand!';
}

function detectGesture(lm) {
  // Finger tip / pip indices: [tip,pip] for each finger
  const fingers = [[8,6],[12,10],[16,14],[20,18]];
  let extended = 0;
  fingers.forEach(([tip,pip])=>{
    if(lm[tip].y < lm[pip].y) extended++;
  });
  const thumbOpen = Math.abs(lm[4].x - lm[2].x) > 0.07;
  if(extended === 0 && !thumbOpen) return 'fist';
  if(extended === 1 && lm[8].y < lm[6].y) return 'point';
  if(extended >= 3) return 'open';
  return 'other';
}

// Start
initThree();
</script>
</body>
</html>
